 <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moderne Einkaufsliste</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF6B6B">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --baumarkt: #D35400; /* Abgedunkeltes Orange für perfekten Kontrast */
            --whatsapp: #25D366;
            --danger: #FF4757;
            --share: #5f27cd;
            --bg-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --text-dark: #2F3542;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .app-container {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Tabs für die Auswahl */
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #eee;
            background: #f8f9fa;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-dark);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn.active[data-mode="discounter"] {
            border-color: var(--secondary);
            background: var(--secondary);
            color: white;
        }

        .mode-btn.active[data-mode="baumarkt"] {
            border-color: var(--baumarkt);
            background: var(--baumarkt);
            color: white;
        }

        h1 { 
            text-align: center; 
            color: var(--primary); 
            font-size: 24px; 
            margin-bottom: 5px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-group { display: flex; flex-direction: column; gap: 10px; }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            color: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #addBtn { background-color: var(--secondary); }
        .baumarkt-theme #addBtn { background-color: var(--baumarkt); }

        ul { list-style: none; margin: 10px 0; max-height: 40vh; overflow-y: auto; }

        li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            margin-bottom: 8px;
            padding: 10px 15px;
            border-radius: 12px;
        }

        .item-content { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .item-text.checked { text-decoration: line-through; color: #a4b0be; }

        .checkbox {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid var(--secondary);
            display: flex; justify-content: center; align-items: center; font-size: 12px;
        }
        
        .baumarkt-theme .checkbox { border-color: var(--baumarkt); }
        .checked .checkbox { background-color: var(--secondary); color: white; }
        .baumarkt-theme .checked .checkbox { background-color: var(--baumarkt); }

        .delete-item-btn { 
            background: transparent; 
            color: var(--danger); 
            width: auto; 
            font-size: 18px; 
            padding: 5px;
        }

        .action-buttons { display: flex; flex-direction: column; gap: 8px; }
        .whatsapp-btn { background-color: var(--whatsapp); }
        .clear-btn { background-color: var(--danger); }
        .share-app-btn { background-color: var(--share); }
    </style>
</head>
<body class="discounter-theme">

    <div class="app-container">
        <h1 id="appTitle"><i class="fa-solid fa-basket-shopping"></i> Discounter Liste</h1>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="discounter" onclick="setMode('discounter')">
                <i class="fa-solid fa-basket-shopping"></i> Discounter
            </button>
            <button class="mode-btn" data-mode="baumarkt" onclick="setMode('baumarkt')">
                <i class="fa-solid fa-toolbox"></i> Baumarkt
            </button>
        </div>

        <div class="input-group">
            <input type="text" id="articleInput" list="articleList" placeholder="Artikel...">
            <datalist id="articleList"></datalist>
            <input type="text" id="quantityInput" placeholder="Menge (optional)">
        </div>

        <button id="addBtn" onclick="addItem()">Hinzufügen <i class="fa-solid fa-plus"></i></button>

        <ul id="shoppingList"></ul>

        <div class="action-buttons">
            <button class="whatsapp-btn" onclick="shareWhatsApp()">Liste teilen <i class="fa-brands fa-whatsapp"></i></button>
            <button class="clear-btn" onclick="clearList()">Liste löschen <i class="fa-solid fa-trash-can"></i></button>
        </div>
    </div>

    <script>
        let currentMode = 'discounter';
        
        // Laden der Daten für beide Modi
        let data = JSON.parse(localStorage.getItem('pwa_shopping_data')) || {
            discounter: { items: [], suggestions: [] },
            baumarkt: { items: [], suggestions: [] }
        };

        const articleInput = document.getElementById('articleInput');
        const quantityInput = document.getElementById('quantityInput');
        const listContainer = document.getElementById('shoppingList');
        const articleDatalist = document.getElementById('articleList');

        function setMode(mode) {
            currentMode = mode;
            
            // UI Anpassungen
            document.body.className = mode + '-theme';
            
            // Update Title with corresponding Icon
            const titleElement = document.getElementById('appTitle');
            if(mode === 'discounter') {
                titleElement.innerHTML = '<i class="fa-solid fa-basket-shopping"></i> Discounter Liste';
            } else {
                titleElement.innerHTML = '<i class="fa-solid fa-toolbox"></i> Baumarkt Liste';
            }
            
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-mode') === mode);
            });

            updateDatalists();
            renderList();
        }

        function updateDatalists() {
            articleDatalist.innerHTML = '';
            data[currentMode].suggestions.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s;
                articleDatalist.appendChild(opt);
            });
        }

        function addItem() {
            const art = articleInput.value.trim();
            const qty = quantityInput.value.trim();
            if (!art) return;

            data[currentMode].items.push({ art, qty, checked: false });
            
            if (!data[currentMode].suggestions.includes(art)) {
                data[currentMode].suggestions.push(art);
            }

            save();
            articleInput.value = '';
            quantityInput.value = '';
            articleInput.focus();
            renderList();
        }

        function renderList() {
            listContainer.innerHTML = '';
            data[currentMode].items.forEach((item, index) => {
                const li = document.createElement('li');
                
                // Icon für Checkbox einbauen
                const checkIcon = item.checked ? '<i class="fa-solid fa-check"></i>' : '';
                
                li.innerHTML = `
                    <div class="item-content ${item.checked ? 'checked' : ''}" onclick="toggleCheck(${index})">
                        <div class="checkbox">${checkIcon}</div>
                        <span class="item-text">${item.qty ? item.qty + ' ' : ''}${item.art}</span>
                    </div>
                    <button class="delete-item-btn" onclick="deleteItem(${index})"><i class="fa-solid fa-xmark"></i></button>
                `;
                listContainer.appendChild(li);
            });
        }

        function toggleCheck(index) {
            data[currentMode].items[index].checked = !data[currentMode].items[index].checked;
            save();
            renderList();
        }

        function deleteItem(index) {
            data[currentMode].items.splice(index, 1);
            save();
            renderList();
        }

        function clearList() {
            if(confirm('Liste wirklich löschen?')) {
                data[currentMode].items = [];
                save();
                renderList();
            }
        }

        function shareWhatsApp() {
            let text = `*${currentMode.toUpperCase()}-LISTE:*\n`;
            // Hier bleiben die echten Emojis erhalten, da WhatsApp sie benötigt
            data[currentMode].items.forEach(i => {
                text += `${i.checked ? '✅' : '◻️'} ${i.qty ? i.qty+' ' : ''}${i.art}\n`;
            });
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        }

        function save() {
            localStorage.setItem('pwa_shopping_data', JSON.stringify(data));
        }

        // Service Worker Reg
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        setMode('discounter'); // Start-Modus
    </script>
</body>
</html>
